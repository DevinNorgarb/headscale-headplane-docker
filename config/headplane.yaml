# Headplane UI — paths are inside the Headplane container

server:
  host: 0.0.0.0
  port: 3000
  # URL users reach in the browser (no /admin suffix). Match your TLS hostname.
  base_url: https://scale.f1y.ing
  # Must be exactly 32 characters — change in anything beyond a lab
  cookie_secret: "CookieSecret32CharsLongString!!!"
  cookie_secure: true
  cookie_max_age: 86400
  data_path: /var/lib/headplane

headscale:
  url: http://headscale:8080
  public_url: https://scale.f1y.ing
  config_path: /etc/headscale/config.yaml
  config_strict: false

integration:
  agent:
    enabled: false
    # Required by Headplane ≥ ~0.7 even when the agent is off (see tale/headplane#455).
    pre_authkey: ""
  docker:
    enabled: false
    container_label: "me.tale.headplane.target=headscale"
    socket: "unix:///var/run/docker.sock"
  kubernetes:
    enabled: false
    validate_manifest: true
    pod_name: "headscale"
  proc:
    enabled: false
